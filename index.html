    <meta name="description" content="Professional web design services for small businesses and creators. Fast, responsive websites that help you get more customers. Free quote available.">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Renex_Design",
        "description": "Professional web design services for small businesses and creators",
        "url": "https://renex-design.com",
        "sameAs": ["https://www.instagram.com/renex_design"],
        "serviceArea": "Worldwide",
        "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "Web Design Services",
            "itemListElement": [
                {
                    "@type": "Offer",
                    "itemOffered": {
                        "@type": "Service",
                        "name": "Website Design",
                        "description": "Custom responsive website design"
                    }
                },
                {
                    "@type": "Offer",
                    "itemOffered": {
                        "@type": "Service",
                        "name": "E-commerce Development",
                        "description": "Online store development and setup"
                    }
                }
            ]
        }
    }
    </script>
